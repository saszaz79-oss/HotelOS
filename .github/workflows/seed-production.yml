name: Seed Production Platform Owner

# Manually triggered only, and safe to re-run: prisma/seed.ts's production
# path (NODE_ENV=production) checks for an existing "superadmin" user and
# skips creation entirely if one exists — it never overwrites a password on
# an existing account, and running this workflow twice never creates a
# duplicate. Run this once, after the Database Migration workflow has
# applied prisma/migrations/ to the production database.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm — creates the "superadmin" Platform Owner account (temporary password, forced change on first login) if it does not already exist'
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'
    environment: production
    env:
      # Job-level (not step-level): `npm ci` triggers the `postinstall`
      # script (`prisma generate`), which loads prisma.config.ts, which
      # reads DATABASE_URL — so `npm ci` itself needs this set, not just the
      # later seed step.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is empty or not set. Add it as a repository secret (Settings -> Secrets and variables -> Actions -> New repository secret) named exactly DATABASE_URL, then re-run this workflow."
            exit 1
          fi
          echo "DATABASE_URL is set."

      - run: npm ci

      - name: Seed production Platform Owner
        run: npm run db:seed
        env:
          # Deliberately scoped to this step only, not job-level: setting
          # NODE_ENV=production during `npm ci` makes npm skip installing
          # devDependencies (tsx, prisma), which this workflow needs —
          # verified empirically. Only prisma/seed.ts's own process needs
          # NODE_ENV=production, to pick its production (not dev-demo) path.
          NODE_ENV: production

      # The temporary password is documented (prisma/seed.ts, README) rather
      # than randomly generated, because mustChangePassword=true makes the
      # account unusable beyond a single login until the real operator sets
      # their own password. Log in immediately after this workflow finishes
      # and change it — see docs/PRODUCTION_ENVIRONMENT.md.
